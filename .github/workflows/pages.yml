name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Resolve Supabase env (secrets > committed .env > hardcoded fallback)
        id: env
        run: |
          # Prefer GitHub Secrets, fall back to the committed .env (public anon keys are safe),
          # and finally fall back to the known project values so the build NEVER ships empty.
          URL="${{ secrets.VITE_SUPABASE_URL }}"
          KEY="${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}"
          PID="${{ secrets.VITE_SUPABASE_PROJECT_ID }}"

          if [ -f .env ]; then
            # shellcheck disable=SC1091
            set -a; . ./.env; set +a || true
            URL="${URL:-$VITE_SUPABASE_URL}"
            KEY="${KEY:-$VITE_SUPABASE_PUBLISHABLE_KEY}"
            PID="${PID:-$VITE_SUPABASE_PROJECT_ID}"
          fi

          URL="${URL:-https://yweknqfqvjkxepivuufc.supabase.co}"
          KEY="${KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3ZWtucWZxdmpreGVwaXZ1dWZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjIzNDIsImV4cCI6MjA5MjYzODM0Mn0.TLTutE0KrgTIjjP8PePqNFf-GuqXAeIdE3vNHIDv8Ic}"
          PID="${PID:-yweknqfqvjkxepivuufc}"

          echo "url=$URL"   >> "$GITHUB_OUTPUT"
          echo "key=$KEY"   >> "$GITHUB_OUTPUT"
          echo "pid=$PID"   >> "$GITHUB_OUTPUT"

          # Also write a .env so vite picks them up automatically
          {
            echo "VITE_SUPABASE_URL=$URL"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=$KEY"
            echo "VITE_SUPABASE_PROJECT_ID=$PID"
          } > .env

          echo "Resolved Supabase URL: $URL"
          echo "Resolved Project ID:   $PID"
          echo "Key length:            ${#KEY}"

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ steps.env.outputs.url }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ steps.env.outputs.key }}
          VITE_SUPABASE_PROJECT_ID: ${{ steps.env.outputs.pid }}
        run: bun run build

      - name: Verify build output (incl. Supabase URL is baked into bundle)
        run: |
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }
          test -d dist/assets || { echo "::error::dist/assets missing"; exit 1; }
          if ! grep -rq "yweknqfqvjkxepivuufc.supabase.co" dist/assets; then
            echo "::error::Supabase URL was not inlined into the production bundle."
            exit 1
          fi
          echo "✓ Supabase URL successfully inlined into bundle"
          ls -la dist/

      - name: Generate SPA 404 fallback (preserves deep-link path)
        run: |
          cat > dist/404.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <title>Loading…</title>
              <script>
                // Preserve the originally requested path so the SPA can restore it after redirect to /
                (function () {
                  var l = window.location;
                  sessionStorage.setItem(
                    'spa-redirect',
                    l.pathname + l.search + l.hash
                  );
                  l.replace(l.origin + '/');
                })();
              </script>
            </head>
            <body></body>
          </html>
          HTML

      - name: Inject SPA path-restore snippet into index.html
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('dist/index.html')
          html = p.read_text()
          snippet = (
            '<script>(function(){var r=sessionStorage.getItem("spa-redirect");'
            'if(r){sessionStorage.removeItem("spa-redirect");'
            'history.replaceState(null,"",r);}})();</script>'
          )
          if snippet not in html:
            html = html.replace('</head>', snippet + '</head>', 1)
            p.write_text(html)
          print(html[:500])
          PY

      - name: Ensure CNAME for custom domain
        run: echo "aiknowledge.younesblg.com" > dist/CNAME

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
