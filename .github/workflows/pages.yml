name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  CANONICAL_SUPABASE_URL: https://yweknqfqvjkxepivuufc.supabase.co
  CANONICAL_SUPABASE_PROJECT_ID: yweknqfqvjkxepivuufc
  CANONICAL_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3ZWtucWZxdmpreGVwaXZ1dWZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjIzNDIsImV4cCI6MjA5MjYzODM0Mn0.TLTutE0KrgTIjjP8PePqNFf-GuqXAeIdE3vNHIDv8Ic

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Prepare Vite production environment
        run: |
          set -euo pipefail

          URL="${{ secrets.VITE_SUPABASE_URL }}"
          KEY="${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}"
          ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          PID="${{ secrets.VITE_SUPABASE_PROJECT_ID }}"

          [ -n "$ANON_KEY" ] && KEY="${KEY:-$ANON_KEY}"

          if [ -f .env ]; then
            set +u
            set -a
            . ./.env
            set +a
            set -u
            URL="${URL:-${VITE_SUPABASE_URL:-}}"
            KEY="${KEY:-${VITE_SUPABASE_PUBLISHABLE_KEY:-${VITE_SUPABASE_ANON_KEY:-}}}"
            PID="${PID:-${VITE_SUPABASE_PROJECT_ID:-}}"
          fi

          URL="${URL:-$CANONICAL_SUPABASE_URL}"
          KEY="${KEY:-$CANONICAL_SUPABASE_PUBLISHABLE_KEY}"
          PID="${PID:-$CANONICAL_SUPABASE_PROJECT_ID}"

          export VITE_SUPABASE_URL="$URL"
          export VITE_SUPABASE_PUBLISHABLE_KEY="$KEY"
          export VITE_SUPABASE_ANON_KEY="$KEY"
          export VITE_SUPABASE_PROJECT_ID="$PID"

          python3 - <<'PY'
          import base64, json, os, sys
          url = os.environ["VITE_SUPABASE_URL"]
          key = os.environ["VITE_SUPABASE_PUBLISHABLE_KEY"]
          pid = os.environ["VITE_SUPABASE_PROJECT_ID"]
          if not url.startswith("https://") or pid not in url:
              sys.exit("::error::VITE_SUPABASE_URL is missing, invalid, or does not match VITE_SUPABASE_PROJECT_ID")
          if len(key) < 80 or key.count(".") != 2:
              sys.exit("::error::VITE_SUPABASE_PUBLISHABLE_KEY / anon key is missing or invalid")
          payload = key.split(".")[1]
          payload += "=" * (-len(payload) % 4)
          claims = json.loads(base64.urlsafe_b64decode(payload.encode()))
          if claims.get("ref") != pid:
              sys.exit("::error::Publishable key project ref does not match VITE_SUPABASE_PROJECT_ID")
          PY

          {
            echo "VITE_SUPABASE_URL=$URL"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=$KEY"
            echo "VITE_SUPABASE_ANON_KEY=$KEY"
            echo "VITE_SUPABASE_PROJECT_ID=$PID"
          } >> "$GITHUB_ENV"

          {
            echo "VITE_SUPABASE_URL=$URL"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=$KEY"
            echo "VITE_SUPABASE_ANON_KEY=$KEY"
            echo "VITE_SUPABASE_PROJECT_ID=$PID"
          } > .env.production.local

          echo "Resolved backend URL: $URL"
          echo "Resolved project ID:  $PID"
          echo "Publishable key validated for project parity"

      - name: Build
        run: bun run build

      - name: Verify build output and inlined backend config
        run: |
          set -euo pipefail
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }
          test -d dist/assets || { echo "::error::dist/assets missing"; exit 1; }
          if ! grep -R --binary-files=without-match -Fq "$VITE_SUPABASE_URL" dist/assets; then
            echo "::error::VITE_SUPABASE_URL was not inlined into the production bundle."
            exit 1
          fi
          if ! grep -R --binary-files=without-match -Fq "$VITE_SUPABASE_PUBLISHABLE_KEY" dist/assets; then
            echo "::error::VITE_SUPABASE_PUBLISHABLE_KEY / anon key was not inlined into the production bundle."
            exit 1
          fi
          echo "✓ Backend URL and publishable key successfully inlined into bundle"
          ls -la dist/

      - name: Generate SPA 404 fallback (preserves deep-link path)
        run: |
          cat > dist/404.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <title>Loading…</title>
              <script>
                // Preserve the originally requested path so the SPA can restore it after redirect to /
                (function () {
                  var l = window.location;
                  sessionStorage.setItem(
                    'spa-redirect',
                    l.pathname + l.search + l.hash
                  );
                  l.replace(l.origin + '/');
                })();
              </script>
            </head>
            <body></body>
          </html>
          HTML

      - name: Inject SPA path-restore snippet into index.html
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('dist/index.html')
          html = p.read_text()
          snippet = (
            '<script>(function(){var r=sessionStorage.getItem("spa-redirect");'
            'if(r){sessionStorage.removeItem("spa-redirect");'
            'history.replaceState(null,"",r);}})();</script>'
          )
          if snippet not in html:
            html = html.replace('</head>', snippet + '</head>', 1)
            p.write_text(html)
          print(html[:500])
          PY

      - name: Ensure CNAME for custom domain
        run: echo "aiknowledge.younesblg.com" > dist/CNAME

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
