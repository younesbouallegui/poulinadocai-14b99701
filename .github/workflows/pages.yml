name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Validate required build secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: |
          missing=0
          for v in VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY VITE_SUPABASE_PROJECT_ID; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required GitHub Secret: $v"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "Add the secrets in: Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      - name: Verify build output
        run: |
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }
          test -d dist/assets || { echo "::error::dist/assets missing"; exit 1; }
          ls -la dist/

      - name: Generate SPA 404 fallback (preserves deep-link path)
        run: |
          cat > dist/404.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <title>Loading…</title>
              <script>
                // Preserve the originally requested path so the SPA can restore it after redirect to /
                (function () {
                  var l = window.location;
                  sessionStorage.setItem(
                    'spa-redirect',
                    l.pathname + l.search + l.hash
                  );
                  l.replace(l.origin + '/');
                })();
              </script>
            </head>
            <body></body>
          </html>
          HTML

      - name: Inject SPA path-restore snippet into index.html
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('dist/index.html')
          html = p.read_text()
          snippet = (
            '<script>(function(){var r=sessionStorage.getItem("spa-redirect");'
            'if(r){sessionStorage.removeItem("spa-redirect");'
            'history.replaceState(null,"",r);}})();</script>'
          )
          if snippet not in html:
            html = html.replace('</head>', snippet + '</head>', 1)
            p.write_text(html)
          print(html[:500])
          PY

      - name: Ensure CNAME for custom domain
        run: echo "aiknowledge.younesblg.com" > dist/CNAME

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
